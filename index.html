<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SVG Grid Drawing Tool</title>
    <script>
      // Apply saved theme before paint to avoid a flash.
      try {
        if (localStorage.getItem("theme") === "dark")
          document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23ffc800'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app">
      <main id="stage"></main>
      <!-- Floating UI over the full-bleed canvas. Containers are filled by the Shell. -->
      <div id="ui">
        <div id="modes" class="float"></div>
        <button id="theme-toggle" class="float" title="Toggle theme"></button>
        <div id="dock">
          <div id="ctx-above" class="hidden"></div>
          <div id="context" class="float"></div>
          <div id="brush-bar" class="float hidden"></div>
          <div id="dock-row">
            <div id="edits" class="float"></div>
            <div id="toolbox" class="float"></div>
            <div id="settings" class="float"></div>
          </div>
        </div>
        <div id="status" class="float corner"></div>
        <div id="zoombox" class="float corner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
